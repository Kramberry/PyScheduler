<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weekly Schedule Planner</title>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { text-align: center; }
    .top-links { text-align: right; margin-bottom: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; font-size: 14px; }
    th, td { border: 1px solid #aaa; padding: 6px; text-align: center; vertical-align: top; }
    th { background-color: #d9d9d9; }
    .name-cell { font-weight: bold; background-color: #e6ffe6; width: 120px; }
    .submit-row { margin-top: 20px; text-align: center; }
    button { padding: 10px 20px; font-size: 16px; }
    label { font-size: 11px; }
    .time-select { width: 95%; margin-bottom: 4px; }
    .role-group label { display: block; }
  </style>

  <script>
    function handleRoleChange(inputEl) {
  const cell = inputEl.closest("td");
  const timeSelects = cell.querySelectorAll(".time-select");
  const ptoChecked = cell.querySelector("input[value='PTO']").checked;

  if (ptoChecked) {
    timeSelects.forEach(s => {
      s.selectedIndex = 0;
      s.disabled = true;
    });
  } else {
    timeSelects.forEach(s => s.disabled = false);
  }
}

      

    // Ensure PTO disables time dropdowns on page load
    window.addEventListener("load", function () {
      document.querySelectorAll("input[value='PTO']").forEach(radio => {
        if (radio.checked) {
          handleRoleChange(radio);
        }
      });
    });
  </script>
</head>

<body>
  <h1>Weekly Schedule Planner</h1>

  <div class="top-links">
    <a href="{{ url_for('manage_employees') }}">Manage Employees</a>
  </div>

  <form method="POST">

    <!-- WEEK START -->
    <div style="margin-bottom: 15px;">
      <label><strong>Week Starting:</strong></label>
      <input
        type="date"
        name="week_start"
        required
        value="{{ saved.get('week_start', '') }}">
    </div>

    <table>
      <thead>
        <tr>
          <th>Team Member</th>
          {% for d in days %}
            <th>{{ d }}</th>
          {% endfor %}
        </tr>
      </thead>

      <tbody>
        {% for emp in employees %}
        <tr>
          <td class="name-cell">{{ emp }}</td>

          {% for d in days %}
          <td>

            <!-- ROLE (Checkbox BUTTONS) -->
            <div class="role-group">
              <label><strong>Role:</strong></label>

              {% for role in ["Printer", "Sealer", "Shipper", "Production Coord.", "PTO"] %}
              <label>
                <input
                  type="checkbox"
                  name="{{ emp }}_{{ d }}_role"
                  value="{{ role }}"
                  onchange="handleRoleChange(this)"
                  {% if role in saved.get("schedule", {}).get(emp, {}).get(d, {}).get("role", []) %}
                    checked
                  {% endif %}>
                {{ role }}
              </label>
              {% endfor %}
            </div>

            <hr>

            <!-- TIME (DROPDOWNS) -->
            <div>
              <label><strong>Start:</strong></label><br>
              <select name="{{ emp }}_{{ d }}_start" class="time-select">
                <option value="">--</option>
                {% for period in ["AM", "PM"] %}
                  {% for h in range(1,13) %}
                    {% for m in ["00","30"] %}
                      {% set t = h ~ ":" ~ m ~ " " ~ period %}
                      <option value="{{ t }}"
                        {% if saved.get("schedule", {}).get(emp, {}).get(d, {}).get("start") == t %}
                          selected
                        {% endif %}>
                        {{ t }}
                      </option>
                    {% endfor %}
                  {% endfor %}
                {% endfor %}
              </select>

              <br>

              <label><strong>End:</strong></label><br>
              <select name="{{ emp }}_{{ d }}_end" class="time-select">
                <option value="">--</option>
                {% for period in ["AM", "PM"] %}
                  {% for h in range(1,13) %}
                    {% for m in ["00","30"] %}
                      {% set t = h ~ ":" ~ m ~ " " ~ period %}
                      <option value="{{ t }}"
                        {% if saved.get("schedule", {}).get(emp, {}).get(d, {}).get("end") == t %}
                          selected
                        {% endif %}>
                        {{ t }}
                      </option>
                    {% endfor %}
                  {% endfor %}
                {% endfor %}
              </select>
            </div>

          </td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="submit-row">
      <button type="submit">
        Generate Excel Schedule
      </button>

      <button formaction="/export-pdf" formmethod="post">
        Download PDF
      </button>
    </div>

  </form>
</body>
</html>
