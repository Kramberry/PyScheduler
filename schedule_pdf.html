<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Weekly Schedule</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 6px;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h1>Weekly Schedule</h1>

<table>
    <thead>
        <tr>
            <th>Employee</th>
            {% for day in days %}
                <th>{{ day }}</th>
            {% endfor %}
        </tr>
    </thead>

    <tbody>
        {% for emp, days_data in saved.get("schedule", {}).items() %}
            <tr>
                <td><strong>{{ emp }}</strong></td>
                {% for day in days %}
                    <td>
                        {{ days_data[d].start }} - {{ days_data[d].end}}<br>
                        {{ days_data[d].role }}
                    </td>
                {% endfor %}
            </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
